<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goa Language</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
</head>
<body>
    <header id="navbar">
        <h1>Goa</h1>
        
        <nav>
            <a>Documentation</a>
            <a>Save in browser</a>
            <a>Save to file</a>
            <a>Upload file</a>
        </nav>
    </header>

    <div id="holder">
        <div class="half" id="code">
            <h1 class="title">Code</h1>
            <textarea placeholder="Type your code in here!"></textarea>
        </div>

        <div class="half" id="right">
            <div class="quarter" id="input">
                <h1 class="title">Input</h1>
                <textarea placeholder="Input goes here!"></textarea>
            </div>

            <div class="quarter" id="output">
                <div id="button-holder">
                    <button>RUN</button>
                    <button>STOP</button>
                </div>
                <h1 class="title">Output</h1>
                <p>asdf</p>
            </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
